<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dot</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app">
        <div id="settings-container">
            <button id="trophy-btn">+</button>
            <button id="settings-btn">*</button>
            <div id="settings-menu" class="hidden">
                <button id="reset-btn">RESET</button>
                <button id="quit-btn">QUIT</button>
            </div>
        </div>
        <div id="pet-container">
            <canvas id="pet-canvas" width="128" height="128"></canvas>
        </div>

        <div id="stats-container">
            <div class="stat-bar">
                <span class="stat-label">HUNGER</span>
                <div class="stat-bar-bg">
                    <div id="hunger-bar" class="stat-bar-fill" style="width: 100%"></div>
                </div>
                <span id="hunger-value" class="stat-value">100</span>
            </div>

            <div class="stat-bar">
                <span class="stat-label">HAPPY</span>
                <div class="stat-bar-bg">
                    <div id="happiness-bar" class="stat-bar-fill" style="width: 100%"></div>
                </div>
                <span id="happiness-value" class="stat-value">100</span>
            </div>

            <div class="stat-bar">
                <span class="stat-label">ENERGY</span>
                <div class="stat-bar-bg">
                    <div id="energy-bar" class="stat-bar-fill" style="width: 100%"></div>
                </div>
                <span id="energy-value" class="stat-value">100</span>
            </div>

            <div class="stat-bar">
                <span class="stat-label">HEALTH</span>
                <div class="stat-bar-bg">
                    <div id="health-bar" class="stat-bar-fill" style="width: 100%"></div>
                </div>
                <span id="health-value" class="stat-value">100</span>
            </div>
        </div>

        <div id="info-container">
            <div id="pet-info">
                <span id="pet-name">dot</span> .
                <span id="pet-stage">Egg</span> .
                <span id="pet-age">0d</span> .
                <span id="pet-streak">0 streak</span>
            </div>
        </div>

        <div id="actions-container">
            <button id="feed-btn" class="action-btn">FEED</button>
            <button id="play-btn" class="action-btn">PLAY</button>
            <button id="sleep-btn" class="action-btn">SLEEP</button>
        </div>

        <div id="death-overlay" class="hidden">
            <div id="death-content">
                <div id="death-icon">X_X</div>
                <h2>GAME OVER</h2>
                <p>Press button to restart</p>
                <button id="revive-btn" class="action-btn">NEW PET</button>
            </div>
        </div>

        <div id="achievements-overlay" class="hidden">
            <div id="achievements-content">
                <div id="achievements-header">
                    <h2>ACHIEVEMENTS</h2>
                    <button id="achievements-close-btn">X</button>
                </div>
                <div id="achievements-grid"></div>
            </div>
        </div>

        <div id="achievement-toast" class="hidden">
            <span id="toast-text"></span>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
